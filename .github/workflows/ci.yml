name: CI

# Builds the frontend, compiles the Rust app, and runs tests on macOS
# (Apple Silicon + Intel) and Windows for every push and PR, so a broken
# build can never reach a tagged release.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (arm64)
            rust_target: aarch64-apple-darwin
          - platform: macos-13 # Intel (x86_64)
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck and build frontend
        run: npm run build

      - name: Compile Rust app
        run: cargo build --manifest-path src-tauri/Cargo.toml --target ${{ matrix.rust_target }}

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --target ${{ matrix.rust_target }}
