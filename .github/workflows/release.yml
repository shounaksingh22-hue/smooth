name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Smooth v__VERSION__'
          releaseBody: |
            ## Smooth v__VERSION__

            ### Downloads

            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon) | `Smooth_${{ github.ref_name }}_aarch64.dmg` |
            | macOS (Intel) | `Smooth_${{ github.ref_name }}_x64.dmg` |
            | Windows (64-bit) | `Smooth_${{ github.ref_name }}_x64-setup.exe` or `.msi` |

            ### Security

            **SHA-256 Checksums** are attached to each artifact below.

            It's good practice to verify your download:
            - **macOS:** `shasum -a 256 Smooth_*.dmg`
            - **Windows:** `Get-FileHash Smooth_*-setup.exe -Algorithm SHA256`

            You can also upload the installer to [VirusTotal](https://www.virustotal.com/) for scanning.

            ### What's New

            See [CHANGELOG.md](CHANGELOG.md) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          echo "## SHA-256 Checksums" > checksums.txt
          echo "" >> checksums.txt
          find . -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \) | while read file; do
            sha256sum "$file" >> checksums.txt
          done
          cat checksums.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: checksums.txt
          tag_name: ${{ github.ref_name }}
          draft: true
